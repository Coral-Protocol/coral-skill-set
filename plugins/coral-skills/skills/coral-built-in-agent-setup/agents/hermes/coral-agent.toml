edition = 3

[agent]
name = "hermes-agent"
version = "0.1.0"
description = "hermes agent for general useage"

readme = "Hermes agent bridge for Coral Protocol"
summary = "Bridges Hermes to Coral for multi-agent communication"

[agent.license]
type = "spdx"
expression = "MIT"

[options.auto_launch]
type = "string"
default = "false"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
