edition = 3

[agent]
name = "puppet-agent"
version = "0.1.0"
description = "a dummy agent for testing"

readme = "Puppet dummy agent for Coral Protocol"
summary = "A minimal dummy agent that connects to Coral and waits for instructions"

[agent.license]
type = "spdx"
expression = "MIT"

[options.auto_launch]
type = "string"
default = "false"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
