edition = 3

[agent]
name = "claude-code-agent"
version = "0.1.0"
description = "claude-code agent for programming task"

readme = "Claude Code agent bridge for Coral Protocol"
summary = "Bridges Claude Code to Coral for multi-agent communication"

[agent.license]
type = "spdx"
expression = "MIT"

[options.auto_launch]
type = "string"
default = "false"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
